server:
  port: 8080
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: 2048MB

spring:
  servlet:
    multipart:
      max-file-size: 2048MB
      max-request-size: 2048MB
      file-size-threshold: 2MB

assistant:
  gemma:
    model: gemma4:e4b
    fallback-model: gemma4:26b
    connect-timeout-ms: 2000
    read-timeout-ms: 60000
